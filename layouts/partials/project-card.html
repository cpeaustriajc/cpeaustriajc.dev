<article class="project-card">
  <div class="project-card-body">
    <div class="project-card-header">
      <h3 class="project-card-title">
        {{ .title }}
      </h3>
      <span class="project-status {{ if eq .status "active" }}active{{ else }}archived{{ end }}">
        {{ if eq .status "active" }}Active{{ else }}Archived{{ end }}
      </span>
    </div>
    <p class="project-card-desc">
      {{ .description }}
    </p>
  </div>
  <div class="project-card-links">
    <a href="{{ .link }}" target="_blank" rel="noopener noreferrer" class="link-accent">
      Source Code &rarr;
    </a>
    {{ if eq .status "active" }}
      <a href="{{ .site }}" target="_blank" rel="noopener noreferrer" class="link-accent">
        Live Site &rarr;
      </a>
    {{ end }}
  </div>
</article>
