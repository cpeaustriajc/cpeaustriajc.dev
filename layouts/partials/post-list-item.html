<article class="group relative border-b border-apple-border py-8 last:border-b-0 dark:border-apple-border-dark">
  <time class="text-sm text-apple-text-secondary" datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">
    {{ .Date.Format "January 2, 2006" }}
  </time>
  <h3 class="mt-2 text-xl font-semibold tracking-tight-apple">
    <a href="{{ .RelPermalink }}" class="transition-colors group-hover:text-apple-accent dark:group-hover:text-apple-accent-dark after:absolute after:inset-0">
      {{ .Title }}
    </a>
  </h3>
  <p class="mt-2 leading-relaxed text-apple-text-secondary">
    {{ .Description }}
  </p>
</article>
