<article class="post-item">
  <time class="post-item-date" datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">
    {{ .Date.Format "January 2, 2006" }}
  </time>
  <h3 class="post-item-title">
    <a href="{{ .RelPermalink }}" class="post-item-link">
      {{ .Title }}
    </a>
  </h3>
  <p class="post-item-desc">
    {{ .Description }}
  </p>
</article>
